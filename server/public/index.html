<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time Chat Server</title>
    <style>
      @import "./main.css";
      @import "./base.css";
      @import "./chat.css";
    </style>
  </head>
  <body id="app">
    <h1 class="chat-title">💬 Real-Time Chat Server</h1>
    <div class="chat-desc">
      Connectez-vous via un client WebSocket pour échanger en temps réel.
    </div>
    <div class="chat-root">
      <div class="chat-card">
        <div id="chat-window" class="chat-window"></div>
        <!-- Barre d'envoi de message (pour UI, même si non branché côté serveur) -->
        <form class="chat-input-bar" id="chat-form" autocomplete="off">
          <input
            type="text"
            id="author"
            class="chat-input-author"
            placeholder="Pseudo"
            maxlength="20"
            required
          />
          <input
            type="text"
            id="message"
            class="chat-input-message"
            placeholder="Tapez un message..."
            maxlength="200"
            required
          />
          <button type="submit" class="chat-send-btn">Envoyer</button>
        </form>
      </div>
      
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="./chat-client.js"></script>
  </body>
</html>
