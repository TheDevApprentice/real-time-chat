<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Chat</title>
  <style>
    @import "./main.css";
    @import "./base.css";
    @import "./chat.css";
  </style>
</head>
<body id="app">
    <div>
    <h1>Welcome to the Real-Time Chat Server</h1>
    <p>Connect via WebSocket client to send and receive messages.</p>
  </div>
  <div id="chat-window"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const chatWindow = document.getElementById('chat-window');
    
    function renderMsg({ authorName, content, timestamp }) {
      const div = document.createElement('div');
      div.className = 'message';
      const time = new Date(timestamp).toLocaleTimeString();
      div.textContent = `[${time}] ${authorName}: ${content}`;
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    socket.on('history', msgs => msgs.forEach(renderMsg));
    socket.on('message', renderMsg);
  </script>
</body>
</html>
