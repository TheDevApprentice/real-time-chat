  # Galera Cluster Node 1 (Bootstrap)
  mariadb_galera1:
    image: realtime-chat-mariadb-galera:latest
    entrypoint: ["/usr/local/bin/galera-entrypoint.sh"]
    environment:
      GALERA: "1"
      NODE_ID: "1"
      NODE_NAME: "mariadb_galera1"
      NODE_ADDRESS: "mariadb_galera1"
      CLUSTER_NAME: "chat_cluster"
      CLUSTER_SEEDS: ""
      BOOTSTRAP: "1"
      SST_USER: "sst_user"
      SST_PASSWORD: "sst_password"
      GCACHE_SIZE: "256M"
      GCACHE_PAGE_SIZE: "128M"
      INNODB_BUFFER_POOL_SIZE: "256M"
      INNODB_LOG_FILE_SIZE: "64M"
      BINLOG_EXPIRE_DAYS: "3"
      BINLOG_MAX_SIZE: "100M"
      GTID_DOMAIN_ID: "1"
      MARIADB_DATABASE: chat
      MARIADB_USER: chat
      MARIADB_PASSWORD: chat
      MARIADB_ROOT_PASSWORD: root
      MARIADB_GALERA_CLUSTER: "yes"
      MARIADB_GALERA_MARIABACKUP_USER: "sst_user"
      MARIADB_GALERA_MARIABACKUP_PASSWORD: "sst_password"
    volumes:
      - galera_node1:/var/lib/mysql
      - ./server/Database/MariaDB/initdb/galera:/docker-entrypoint-initdb.d:ro
    networks:
      - dbnet
    deploy:
      restart_policy:
        condition: any

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379:0:changeme
      - HTTP_USER=admin
      - HTTP_PASSWORD=secret
    networks:
      - cachenet
      - proxy
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        # Route /redis-commander -> Redis Commander Web UI (HTTP)
        - "traefik.http.routers.rediscommander.rule=PathPrefix(`/redis-commander`)"
        - "traefik.http.routers.rediscommander.entrypoints=web"
        - "traefik.http.routers.rediscommander.service=rediscommander"
        - "traefik.http.routers.rediscommander.middlewares=rediscommander-strip,rediscommander-auth,rediscommander-allow"
        - "traefik.http.middlewares.rediscommander-strip.stripprefix.prefixes=/redis-commander"
        - "traefik.http.middlewares.rediscommander-auth.basicauth.users=admin:$$apr1$$H6uskkkW$$IgXLP6ewTrSuBkTrqE8wj/"
        - "traefik.http.middlewares.rediscommander-auth.basicauth.removeheader=true"
        - "traefik.http.middlewares.rediscommander-allow.ipwhitelist.sourcerange=127.0.0.1/32,172.30.0.0/24,::1/128"
        - "traefik.http.services.rediscommander.loadbalancer.server.port=8081"
        - "traefik.docker.network=proxy"

  # Galera Cluster Node 2
  mariadb_galera2:
    image: realtime-chat-mariadb-galera:latest
    entrypoint: ["/usr/local/bin/galera-entrypoint.sh"]
    environment:
      GALERA: "1"
      NODE_ID: "2"
      NODE_NAME: "mariadb_galera2"
      NODE_ADDRESS: "mariadb_galera2"
      CLUSTER_NAME: "chat_cluster"
      CLUSTER_SEEDS: "mariadb_galera1,mariadb_galera2,mariadb_galera3"
      BOOTSTRAP: "0"
      SST_USER: "sst_user"
      SST_PASSWORD: "sst_password"
      GCACHE_SIZE: "256M"
      GCACHE_PAGE_SIZE: "128M"
      INNODB_BUFFER_POOL_SIZE: "256M"
      INNODB_LOG_FILE_SIZE: "64M"
      BINLOG_EXPIRE_DAYS: "3"
      BINLOG_MAX_SIZE: "100M"
      GTID_DOMAIN_ID: "1"
      MARIADB_DATABASE: chat
      MARIADB_USER: chat
      MARIADB_PASSWORD: chat
      MARIADB_ROOT_PASSWORD: root
      MARIADB_GALERA_CLUSTER: "yes"
      MARIADB_GALERA_MARIABACKUP_USER: "sst_user"
      MARIADB_GALERA_MARIABACKUP_PASSWORD: "sst_password"
    volumes:
      - galera_node2:/var/lib/mysql
      - ./server/Database/MariaDB/initdb/galera:/docker-entrypoint-initdb.d:ro
    networks:
      - dbnet
    depends_on:
      - mariadb_galera1
    deploy:
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  # Galera Cluster Node 3
  mariadb_galera3:
    image: realtime-chat-mariadb-galera:latest
    entrypoint: ["/usr/local/bin/galera-entrypoint.sh"]
    environment:
      GALERA: "1"
      NODE_ID: "3"
      NODE_NAME: "mariadb_galera3"
      NODE_ADDRESS: "mariadb_galera3"
      CLUSTER_NAME: "chat_cluster"
      CLUSTER_SEEDS: "mariadb_galera1,mariadb_galera2,mariadb_galera3"
      BOOTSTRAP: "0"
      SST_USER: "sst_user"
      SST_PASSWORD: "sst_password"
      GCACHE_SIZE: "256M"
      GCACHE_PAGE_SIZE: "128M"
      INNODB_BUFFER_POOL_SIZE: "256M"
      INNODB_LOG_FILE_SIZE: "64M"
      BINLOG_EXPIRE_DAYS: "3"
      BINLOG_MAX_SIZE: "100M"
      GTID_DOMAIN_ID: "1"
      MARIADB_DATABASE: chat
      MARIADB_USER: chat
      MARIADB_PASSWORD: chat
      MARIADB_ROOT_PASSWORD: root
      MARIADB_GALERA_CLUSTER: "yes"
      MARIADB_GALERA_MARIABACKUP_USER: "sst_user"
      MARIADB_GALERA_MARIABACKUP_PASSWORD: "sst_password"
    volumes:
      - galera_node3:/var/lib/mysql
      - ./server/Database/MariaDB/initdb/galera:/docker-entrypoint-initdb.d:ro
    networks:
      - dbnet
    depends_on:
      - mariadb_galera1
    deploy:
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  # MaxScale - Binlog Server
  maxscale:
    image: mariadb/maxscale:latest
    volumes:
      - ./server/Database/MariaDB/MaxScale/maxscale.cnf:/etc/maxscale.cnf:ro
      - maxscale_data:/var/lib/maxscale
    networks:
      - dbnet
    depends_on:
      - mariadb_galera1
      - mariadb_galera2
      - mariadb_galera3
    deploy:
      restart_policy:
        condition: any
    healthcheck:
      test: [ "CMD", "maxctrl", "list", "services" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
version: "3.9"

# Docker Swarm stack file
# Notes:
# - Build directives are not supported by `docker stack deploy`. Build images first with docker compose, or push to a registry.
# - Traefik must run with providers.docker.swarmMode=true and service labels must be under deploy.labels.
# - Networks are overlay for Swarm. Sticky cookie stays enabled on the chat service.

services:
  traefik:
    image: traefik:v2.11
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --log.level=DEBUG
      - --providers.docker=true
      - --providers.docker.swarmMode=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      # To enable HTTPS with Let's Encrypt in prod, add websecure entrypoint and ACME args here
      # - --entrypoints.websecure.address=:443
      # - --certificatesresolvers.le.acme.tlschallenge=true
      # - --certificatesresolvers.le.acme.email=your-email@example.com
      # - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # - traefik_data:/letsencrypt
    networks:
      - proxy
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

  server:
    # Build is not supported in stack deploy. Ensure this image exists locally or in a registry.
    image: realtime-chat-server:latest
    environment:
      NODE_ENV: production
      DEBUG: "true"
      PORT: 3080
      FRONTEND_URL: http://localhost
      TRUST_PROXY: "true"
      BCRYPT_COST: "12"
      # Redis configuration (URL preferred)
      # Target tasks.<stack>_<service> to bypass VIP and use DNS round-robin of task IPs
      REDIS_URL: redis://:changeme@tasks.chat_redis:6379
      REDIS_HOST: tasks.chat_redis
      REDIS_PORT: 6379
      REDIS_USER: changeme
      REDIS_PASSWORD: changeme
      REDIS_TLS: "false"
      # S3/MinIO configuration
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: adminadmin123
      S3_BUCKET: chat-bucket
      S3_USE_PATH_STYLE: "true"
      S3_PUBLIC_URL_BASE: http://localhost/minio/chat-bucket
      # MariaDB configuration (via ProxySQL in front of Galera)
      DATABASE_DRIVER: mariadb
      MARIADB_HOST: proxysql
      MARIADB_PORT: 6033
      MARIADB_DB: chat
      MARIADB_USER: chat
      MARIADB_PASSWORD: chat
      MARIADB_SSL: "false"
      # MariaDB backup configuration
      MARIADB_HOST_BACKUP: mariadb_backup
      MARIADB_PORT_BACKUP: 3306
      MARIADB_DB_BACKUP: chat_backup
      MARIADB_USER_BACKUP: chat_backup
      MARIADB_PASSWORD_BACKUP: chat_backup
      MARIADB_SSL_BACKUP: "false"
      # TURN / STUN
      WEBRTC_STUN: stun:stun.l.google.com:19302
      WEBRTC_TURN_URLS: turn:turn:3478
      WEBRTC_TURN_USERNAME: devuser
      WEBRTC_TURN_CREDENTIAL: devpass
      CALL_RING_TIMEOUT: 20
    networks:
      - proxy
      - dbnet
      - cachenet
      - stornet
    deploy:
      replicas: 2
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 3s
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.chat.rule=PathPrefix(`/`)"
        - "traefik.http.routers.chat.entrypoints=web"
        - "traefik.http.routers.chat.priority=1"
        - "traefik.http.routers.chat.service=chat"
        - "traefik.http.services.chat.loadbalancer.server.port=3080"
        # Sticky cookie for session affinity (dev HTTP; set secure=true under HTTPS)
        - "traefik.http.services.chat.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.chat.loadbalancer.sticky.cookie.name=chat_affinity"
        - "traefik.http.services.chat.loadbalancer.sticky.cookie.httpOnly=true"
        - "traefik.http.services.chat.loadbalancer.sticky.cookie.secure=false"
        - "traefik.http.services.chat.loadbalancer.sticky.cookie.sameSite=lax"
        - "traefik.docker.network=proxy"

  turn:
    image: coturn/coturn:latest
    command: >-
      bash -lc "\
      turnserver \
        --no-cli \
        --no-tls \
        --fingerprint \
        --lt-cred-mech \
        --realm=${COTURN_REALM:-chat.local} \
        --user=${COTURN_USER:-devuser}:${COTURN_PASS:-devpass} \
        --external-ip=${COTURN_PUBLIC_IP:-127.0.0.1} \
        --listening-port=3478 \
        --listening-ip=0.0.0.0 \
        --min-port=49160 --max-port=49200 \
        --verbose"
    environment:
      - COTURN_PUBLIC_IP=${COTURN_PUBLIC_IP:-127.0.0.1}
      - COTURN_REALM=${COTURN_REALM:-chat.local}
      - COTURN_USER=${COTURN_USER:-devuser}
      - COTURN_PASS=${COTURN_PASS:-devpass}
    networks:
      - proxy
    deploy:
      restart_policy:
        condition: any

  minio:
    image: realtime-chat-minio:latest
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=adminadmin123
      - S3_BUCKET=chat-bucket
    networks:
      - proxy
      - stornet
    volumes:
      - minio_data:/data
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.minio.rule=PathPrefix(`/minio`)"
        - "traefik.http.routers.minio.entrypoints=web"
        - "traefik.http.routers.minio.service=minio"
        - "traefik.http.routers.minio.middlewares=minio-strip"
        - "traefik.http.middlewares.minio-strip.stripprefix.prefixes=/minio"
        - "traefik.http.services.minio.loadbalancer.server.port=9000"
        - "traefik.http.routers.minio.priority=100"
        - "traefik.http.routers.minioconsole.rule=PathPrefix(`/minio-console`)"
        - "traefik.http.routers.minioconsole.entrypoints=web"
        - "traefik.http.routers.minioconsole.service=minioconsole"
        - "traefik.http.routers.minioconsole.middlewares=minioconsole-strip,minioconsole-auth,minio-allow"
        - "traefik.http.middlewares.minioconsole-auth.basicauth.users=admin:$$apr1$$H6uskkkW$$IgXLP6ewTrSuBkTrqE8wj/"
        - "traefik.http.middlewares.minioconsole-auth.basicauth.removeheader=true"
        - "traefik.http.middlewares.minio-allow.ipwhitelist.sourcerange=127.0.0.1/32,172.30.0.0/24,::1/128"
        - "traefik.http.middlewares.minioconsole-strip.stripprefix.prefixes=/minio-console"
        - "traefik.http.services.minioconsole.loadbalancer.server.port=9001"
        - "traefik.http.routers.minioconsole.priority=110"
        - "traefik.docker.network=proxy"
      restart_policy:
        condition: any

  redis:
    image: realtime-chat-redis:latest
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"${REDIS_PASSWORD:-changeme}\""]
    environment:
      - REDIS_PASSWORD=changeme
    networks:
      - cachenet
    volumes:
      - redis_data:/data
    deploy:
      restart_policy:
        condition: any

  # ProxySQL - Load balancer for Galera cluster
  proxysql:
    image: realtime-chat-proxysql:latest
    volumes:
      - ./server/Database/MariaDB/ProxySQL/proxysql.cnf:/etc/proxysql.cnf:ro
      - proxysql_data:/var/lib/proxysql
    ports:
      - target: 6033
        published: 6033
        protocol: tcp
        mode: host
      - target: 6032
        published: 6032
        protocol: tcp
        mode: host
    environment:
      - PROXYSQL_ADMIN_USER=admin
      - PROXYSQL_ADMIN_PASSWORD=admin
      - MYSQL_USER=monitor
      - MYSQL_PASSWORD=monitor
    networks:
      - dbnet
      - proxy
    deploy:
      restart_policy:
        condition: any
    healthcheck:
      test: [ "CMD", "mysql", "-h127.0.0.1", "-P6032", "-uadmin", "-padmin", "-e", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Initialize ProxySQL configuration once Galera is up
  proxysql-init:
    image: realtime-chat-mariadb:latest
    volumes:
      - ./server/Database/MariaDB/ProxySQL/scripts:/scripts:ro
    networks:
      - dbnet
    depends_on:
      - proxysql
    command: |
      bash -lc '
        set -euo pipefail
        for h in mariadb_galera1 mariadb_galera2 mariadb_galera3; do
          for i in {1..60}; do
            if mariadb-admin ping -h "$h" -P 3306 -uroot -proot --silent >/dev/null 2>&1; then break; fi
            sleep 2
          done
        done
        sleep 10
        mysql -h mariadb_galera1 -P 3306 -u root -proot -e "GRANT PROCESS, REPLICATION CLIENT, REPLICATION SLAVE, SLAVE MONITOR ON *.* TO 'monitor'@'%'; FLUSH PRIVILEGES;"
        mysql -h proxysql -P 6032 -u admin -padmin < /scripts/init_proxysql.sql
        mysql -h proxysql -P 6032 -u admin -padmin -e "DELETE FROM mysql_servers WHERE hostgroup_id=0; LOAD MYSQL SERVERS TO RUNTIME; SAVE MYSQL SERVERS TO DISK;"
      '
    deploy:
      restart_policy:
        condition: none

  mariadb_backup:
    image: realtime-chat-mariadb:latest
    ports:
      - target: 3306
        published: 3317
        protocol: tcp
        mode: host
    environment:
      MARIADB_DATABASE: chat_backup
      MARIADB_USER: chat_backup
      MARIADB_PASSWORD: chat_backup
      MARIADB_ROOT_PASSWORD: root
      # Stream binlogs from MaxScale
      PRIMARY_HOST: maxscale
      PRIMARY_PORT: 3306
      REPL_USER: repl
      REPL_PASSWORD: replpass
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mariadb_backup_data:/var/lib/mysql
      - ./server/Database/MariaDB/conf.d/replica.cnf:/etc/mysql/mariadb.conf.d/zz-replica.cnf:ro
      - ./server/Database/MariaDB/initdb/replicaMaxScale:/docker-entrypoint-initdb.d
    networks:
      - dbnet
      - proxy
    depends_on:
      - proxysql
      - mariadb_galera1
      - mariadb_galera2
      - mariadb_galera3
      - maxscale
    deploy:
      restart_policy:
        condition: any

networks:
  proxy:
    driver: overlay
    attachable: true
  dbnet:
    driver: overlay
    attachable: true
    internal: true
  cachenet:
    driver: overlay
    attachable: true
    internal: true
  stornet:
    driver: overlay
    attachable: true
    internal: true

volumes:
  redis_data: {}
  minio_data: {}
  mariadb_data: {}
  mariadb_backup_data: {}
  traefik_data: {}
  proxysql_data: {}
  maxscale_data: {}
  galera_node1: {}
  galera_node2: {}
  galera_node3: {}

configs:
  mariadb-primary-cnf:
    file: ./server/Database/MariaDB/conf.d/primary.cnf
  mariadb-replica-cnf:
    file: ./server/Database/MariaDB/conf.d/replica.cnf
  mariadb-init-primary-10:
    file: ./server/Database/MariaDB/initdb/primary/10-create-repl-user.sh
  mariadb-init-replica-20:
    file: ./server/Database/MariaDB/initdb/replica/20-setup-replication.sh