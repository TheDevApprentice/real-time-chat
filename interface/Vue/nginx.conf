server {
  listen 80;
  server_name _;

  # Root of the built app
  root /usr/share/nginx/html;
  index index.html;

  # Gzip settings
  gzip on;
  gzip_static on; # Serve pre-compressed .gz files when available
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/manifest+json
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff2
    font/woff
    application/font-woff2;

  # Long-term caching for hashed assets (Vite outputs content-hashed filenames)
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp)$ {
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Serve source maps if they exist (usually disabled in prod)
  location ~* \.(?:map)$ {
    access_log off;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # SPA fallback: send everything else to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Basic security headers (adjust to your needs)
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy no-referrer-when-downgrade always;
  add_header X-XSS-Protection "1; mode=block" always;
}
