services:
  # Reverse proxy / gateway (Traefik)
  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - --api.dashboard=false
      - --api.insecure=false
      - --log.level=DEBUG
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      # Enable HTTPS with Let's Encrypt (free). Uncomment the 4 lines below and set your email and domain DNS to this host.
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=menuwebservice@gmail.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      # NOTE: Do NOT enable HTTP->HTTPS redirection when using ngrok to port 80,
      # as TLS is terminated by ngrok and forwarded to local :80 (would cause loops)
      # Optionally redirect HTTP->HTTPS when enabling websecure
      # - --entrypoints.web.http.redirections.entryPoint.to=websecure
      # - --entrypoints.web.http.redirections.entryPoint.scheme=https
    ports:
      - "80:80"
      - "8080:8080"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/letsencrypt
    networks:
      - proxy
    restart: unless-stopped

  # TURN/STUN server (coturn)
  turn:
    image: coturn/coturn:latest
    container_name: chat-turn
    ports:
      - "3478:3478/udp"
      - "3478:3478"
    environment:
      # REQUIRED: Set to your public IP or DNS-resolved IP of this host for NAT hairpin correctness
      - COTURN_PUBLIC_IP=${COTURN_PUBLIC_IP:-127.0.0.1}
      - COTURN_REALM=${COTURN_REALM:-chat.local}
      - COTURN_USER=${COTURN_USER:-devuser}
      - COTURN_PASS=${COTURN_PASS:-devpass}
    command: >-
      bash -lc "\ turnserver \
        --no-cli \
        --no-tls \
        --fingerprint \
        --lt-cred-mech \
        --realm=${COTURN_REALM:-chat.local} \
        --user=${COTURN_USER:-devuser}:${COTURN_PASS:-devpass} \
        --external-ip=${COTURN_PUBLIC_IP:-127.0.0.1} \
        --listening-port=3478 \
        --listening-ip=0.0.0.0 \
        --min-port=49160 --max-port=49200 \
        --verbose"
    restart: unless-stopped
    networks:
      - proxy

  minio:
    build:
      context: ./server/Minio
      dockerfile: Dockerfile
    image: realtime-chat-minio:latest
    container_name: chat-minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=adminadmin123
      - S3_BUCKET=chat-bucket
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - proxy
      - stornet
    labels:
      - "traefik.enable=true"
      # Route /minio -> MinIO S3 API (HTTP)
      - "traefik.http.routers.minio.rule=PathPrefix(`/minio`)"
      - "traefik.http.routers.minio.entrypoints=web"
      - "traefik.http.routers.minio.service=minio"
      - "traefik.http.routers.minio.middlewares=minio-strip"
      - "traefik.http.middlewares.minio-strip.stripprefix.prefixes=/minio"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio.priority=100"
      - "traefik.docker.network=proxy"

  redis:
    build:
      context: ./server/Redis
      dockerfile: Dockerfile
    image: realtime-chat-redis:latest
    container_name: chat-redis
    # For dev you can inline a password; for production use secrets.
    command: [ "sh", "-c", "exec redis-server --appendonly yes --requirepass \"${REDIS_PASSWORD:-changeme}\"" ]
    environment:
      # Set a strong password here (dev example)
      REDIS_PASSWORD: changeme
    volumes:
      - redis_data:/data
    networks:
      - proxy
      - cachenet
    restart: unless-stopped
    # No Traefik labels here: Redis is TCP on 6379 (not HTTP). Keep it internal.

    # ProxySQL - Load balancer for Galera cluster
  proxysql:
    build:
      context: ./server/Database/MariaDB/ProxySQL
      dockerfile: Dockerfile
    image: realtime-chat-proxysql:latest
    container_name: chat-proxysql
    volumes:
      - ./server/Database/MariaDB/ProxySQL/proxysql.cnf:/etc/proxysql.cnf:ro
      - proxysql_data:/var/lib/proxysql
    environment:
      - PROXYSQL_ADMIN_USER=admin
      - PROXYSQL_ADMIN_PASSWORD=admin
      - MYSQL_USER=monitor
      - MYSQL_PASSWORD=monitor
    depends_on:
      mariadb_galera1:
        condition: service_healthy
      mariadb_galera2:
        condition: service_healthy
      mariadb_galera3:
        condition: service_healthy
    networks:
      - dbnet
      - proxy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysql", "-h127.0.0.1", "-P6032", "-uadmin", "-padmin", "-e", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Galera Cluster Node 1 (Bootstrap node)
  mariadb_galera1:
    build:
      context: ./server/Database/MariaDB/GaleraNode
      dockerfile: Dockerfile
    image: realtime-chat-mariadb-galera:latest
    container_name: chat-galera-1
    entrypoint: ["/usr/local/bin/galera-entrypoint.sh"]
    environment:
      GALERA: "1"
      NODE_ID: "1"
      NODE_NAME: "mariadb_galera1"
      NODE_ADDRESS: "mariadb_galera1"
      CLUSTER_NAME: "cluster"
      # Pour fonctionnement normal, TOUJOURS liste complète (aucun bootstrap implicite)
      CLUSTER_SEEDS: ""
      BOOTSTRAP: "1"
      SST_USER: "sst_user"
      SST_PASSWORD: "sst_password"
      GCACHE_SIZE: "256M"
      GCACHE_PAGE_SIZE: "128M"
      INNODB_BUFFER_POOL_SIZE: "256M"
      INNODB_LOG_FILE_SIZE: "64M"
      BINLOG_EXPIRE_DAYS: "3"
      BINLOG_MAX_SIZE: "100M"
      GTID_DOMAIN_ID: "1"
      MARIADB_DATABASE: chat
      MARIADB_USER: chat
      MARIADB_PASSWORD: chat
      MARIADB_ROOT_PASSWORD: root
      MARIADB_GALERA_CLUSTER: "yes"
      MARIADB_GALERA_MARIABACKUP_USER: "sst_user"
      MARIADB_GALERA_MARIABACKUP_PASSWORD: "sst_password"
    volumes:
      - galera_node1:/var/lib/mysql
      - ./server/Database/MariaDB/initdb/galera:/docker-entrypoint-initdb.d:ro
    networks:
      - dbnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  # Galera Cluster Node 2
  mariadb_galera2:
    build:
      context: ./server/Database/MariaDB/GaleraNode
      dockerfile: Dockerfile
    image: realtime-chat-mariadb-galera:latest
    container_name: chat-galera-2
    entrypoint: ["/usr/local/bin/galera-entrypoint.sh"]
    environment:
      GALERA: "1"
      NODE_ID: "2"
      NODE_NAME: "mariadb_galera2"
      NODE_ADDRESS: "mariadb_galera2"
      CLUSTER_NAME: "cluster"
      # Pour fonctionnement normal, TOUJOURS liste complète (aucun bootstrap implicite)
      CLUSTER_SEEDS: "mariadb_galera1,mariadb_galera2,mariadb_galera3"
      BOOTSTRAP: "0"
      SST_USER: "sst_user"
      SST_PASSWORD: "sst_password"
      GCACHE_SIZE: "256M"
      GCACHE_PAGE_SIZE: "128M"
      INNODB_BUFFER_POOL_SIZE: "256M"
      INNODB_LOG_FILE_SIZE: "64M"
      BINLOG_EXPIRE_DAYS: "3"
      BINLOG_MAX_SIZE: "100M"
      GTID_DOMAIN_ID: "1"
      MARIADB_DATABASE: chat
      MARIADB_USER: chat
      MARIADB_PASSWORD: chat
      MARIADB_ROOT_PASSWORD: root
      MARIADB_GALERA_CLUSTER: "yes"
      MARIADB_GALERA_MARIABACKUP_USER: "sst_user"
      MARIADB_GALERA_MARIABACKUP_PASSWORD: "sst_password"
    volumes:
      - galera_node2:/var/lib/mysql
      - ./server/Database/MariaDB/initdb/galera:/docker-entrypoint-initdb.d:ro
    networks:
      - dbnet
    restart: unless-stopped
    depends_on:
      mariadb_galera1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  # Galera Cluster Node 3
  mariadb_galera3:
    build:
      context: ./server/Database/MariaDB/GaleraNode
      dockerfile: Dockerfile
    image: realtime-chat-mariadb-galera:latest
    container_name: chat-galera-3
    entrypoint: ["/usr/local/bin/galera-entrypoint.sh"]
    environment:
      GALERA: "1"
      NODE_ID: "3"
      NODE_NAME: "mariadb_galera3"
      NODE_ADDRESS: "mariadb_galera3"
      CLUSTER_NAME: "cluster"
      # Pour fonctionnement normal, TOUJOURS liste complète (aucun bootstrap implicite)
      CLUSTER_SEEDS: "mariadb_galera1,mariadb_galera2,mariadb_galera3"
      BOOTSTRAP: "0"
      SST_USER: "sst_user"
      SST_PASSWORD: "sst_password"
      GCACHE_SIZE: "256M"
      GCACHE_PAGE_SIZE: "128M"
      INNODB_BUFFER_POOL_SIZE: "256M"
      INNODB_LOG_FILE_SIZE: "64M"
      BINLOG_EXPIRE_DAYS: "3"
      BINLOG_MAX_SIZE: "100M"
      GTID_DOMAIN_ID: "1"
      MARIADB_DATABASE: chat
      MARIADB_USER: chat
      MARIADB_PASSWORD: chat
      MARIADB_ROOT_PASSWORD: root
      MARIADB_GALERA_CLUSTER: "yes"
      MARIADB_GALERA_MARIABACKUP_USER: "sst_user"
      MARIADB_GALERA_MARIABACKUP_PASSWORD: "sst_password"
    volumes:
      - galera_node3:/var/lib/mysql
      - ./server/Database/MariaDB/initdb/galera:/docker-entrypoint-initdb.d:ro
    networks:
      - dbnet
    restart: unless-stopped
    depends_on:
      mariadb_galera1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  # MaxScale - Binlog Server for replicas (stable binlog endpoint in front of Galera)
  maxscale:
    image: mariadb/maxscale:latest
    container_name: chat-maxscale
    volumes:
      - ./server/Database/MariaDB/MaxScale/maxscale.cnf:/etc/maxscale.cnf:ro
      - maxscale_data:/var/lib/maxscale
    depends_on:
      mariadb_galera1:
        condition: service_healthy
      mariadb_galera2:
        condition: service_healthy
      mariadb_galera3:
        condition: service_healthy
    networks:
      - dbnet
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "maxctrl", "list", "services" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backup/Replica MariaDB (optionnel, pour compatibilité)
  mariadb_backup:
    build:
      context: ./server/Database/MariaDB
      dockerfile: Dockerfile
    image: realtime-chat-mariadb:latest
    container_name: chat-mariadb-backup
    ports:
      - "3317:3306"
    environment:
      MARIADB_DATABASE: chat_backup
      MARIADB_USER: chat_backup
      MARIADB_PASSWORD: chat_backup
      MARIADB_ROOT_PASSWORD: root
      # Replication configuration (via MaxScale Binlog Server)
      PRIMARY_HOST: maxscale
      PRIMARY_PORT: 3306
      REPL_USER: repl
      REPL_PASSWORD: replpass
    volumes:
      - mariadb_backup_data:/var/lib/mysql
      - ./server/Database/MariaDB/conf.d/replica.cnf:/etc/mysql/mariadb.conf.d/zz-replica.cnf:ro
      - ./server/Database/MariaDB/initdb/replicaMaxScale:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      proxysql:
        condition: service_healthy
      mariadb_galera1:
        condition: service_healthy
      mariadb_galera2:
        condition: service_healthy
      mariadb_galera3:
        condition: service_healthy
      maxscale: 
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dbnet
      - proxy

volumes:
  traefik_data:
  redis_data:
  minio_data:
  proxysql_data:
  maxscale_data:
  galera_node1:
  galera_node2:
  galera_node3:
  mariadb_backup_data:

networks:
  proxy:
    name: proxy
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24
  dbnet:
    name: dbnet
    ipam:
      driver: default
      config:
        - subnet: 172.31.10.0/24
  cachenet:
    name: cachenet
    ipam:
      driver: default
      config:
        - subnet: 172.31.20.0/24
  stornet:
    name: stornet
    ipam:
      driver: default
      config:
        - subnet: 172.31.30.0/24
