services:
  server:
    build:
      context: ./server/Express
      dockerfile: Dockerfile
    image: realtime-chat-server:latest
    container_name: chat-server
    ports:
      - "3080:3080"
    environment:
      NODE_ENV: production
      PORT: 3080
      FRONTEND_URL: https://f08df3f1764d.ngrok-free.app
      # Trust proxy (e.g. when behind a reverse proxy)
      TRUST_PROXY: "false"
      # Bcrypt cost
      BCRYPT_COST: "12"
      # Redis configuration
      REDIS_URL: redis://:changeme@redis:6379
      # S3/MinIO configuration
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: adminadmin123
      S3_BUCKET: chat-bucket
      S3_USE_PATH_STYLE: "true"
      # Base URL for public access from host (used to form public links)
      S3_PUBLIC_URL_BASE: http://localhost:9000/chat-bucket
      # Database configuration
      DATABASE_DRIVER: sqlite
      # SQLite configuration
      SQLITE_FILE: /data/chat.sqlite
      # PostgreSQL configuration
      # POSTGRES_HOST: postgres
      # POSTGRES_PORT: 5432
      # POSTGRES_DB: chat
      # POSTGRES_USER: chat
      # POSTGRES_PASSWORD: chat
      # POSTGRES_SSL: false
      # MySQL configuration
      # MYSQL_HOST: mysql
      # MYSQL_PORT: 3306
      # MYSQL_DB: chat
      # MYSQL_USER: chat
      # MYSQL_PASSWORD: chat
      # MYSQL_SSL: false
      WEBRTC_STUN: stun:stun.l.google.com:19302
      # WEBRTC_TURN_URLS: turn:your-turn:3478
      # WEBRTC_TURN_USERNAME: 
      # WEBRTC_TURN_CREDENTIAL: 
      CALL_RING_TIMEOUT: 20
    volumes:
      - sqlite_data:/data
      # - postgres_data:/var/lib/postgresql/data
      # - mysql_data:/var/lib/mysql
    depends_on:
      - sqlite
      - redis
      - minio
      # - postgres
      # - mysql
    restart: unless-stopped

  minio:
    build:
      context: ./server/Minio
      dockerfile: Dockerfile
    image: realtime-chat-minio:latest
    container_name: chat-minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=adminadmin123
      - S3_BUCKET=chat-bucket
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # MinIO Console
    volumes:
      - minio_data:/data
    restart: unless-stopped

  redis:
    build:
      context: ./server/Redis
      dockerfile: Dockerfile
    image: realtime-chat-redis:latest
    container_name: chat-redis
    ports:
      - "6379:6379"
    # For dev you can inline a password; for production use secrets.
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"${REDIS_PASSWORD:-changeme}\""]
    environment:
      # Set a strong password here (dev example)
      REDIS_PASSWORD: changeme
    volumes:
      - redis_data:/data
    restart: unless-stopped

  sqlite:
    build:
      context: ./server/Database/SqlLite
      dockerfile: Dockerfile
    image: realtime-chat-sqlite:latest
    container_name: chat-sqlite
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  # postgres:
  #   build:
  #     context: ./server/Database/Postgres
  #     dockerfile: Dockerfile
  #   image: realtime-chat-postgres:latest
  #   container_name: chat-postgres
  #   environment:
  #     POSTGRES_DB: chat
  #     POSTGRES_USER: chat
  #     POSTGRES_PASSWORD: chat
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped

  # mysql:
  #   build:
  #     context: ./server/Database/MySql
  #     dockerfile: Dockerfile
  #   image: realtime-chat-mysql:latest
  #   container_name: chat-mysql
  #   environment:
  #     MYSQL_DATABASE: chat
  #     MYSQL_USER: chat
  #     MYSQL_PASSWORD: chat
  #     MYSQL_ROOT_PASSWORD: root
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   restart: unless-stopped

  # Web UI's for dev debugging
  
  # Web UI for browsing the SQLite database
  sqlite-web:
    image: coleifer/sqlite-web:latest
    container_name: chat-sqlite-web
    command: ["sqlite_web", "-H", "0.0.0.0", "/data/chat.sqlite"]
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/data
    depends_on:
      - sqlite
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: chat-redis-commander-web
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:changeme
      - HTTP_USER=admin
      - HTTP_PASSWORD=secret
    depends_on:
      - redis
    profiles:
      - tools  # Utilise docker-compose --profile tools up pour inclure ce service

volumes:
  sqlite_data:
  redis_data:
  minio_data:
  # postgres_data:
  # mysql_data:
