version: "3.9"

services:
  server:
    build:
      context: ./server/Express
      dockerfile: Dockerfile
    image: realtime-chat-server:latest
    container_name: chat-server
    ports:
      - "3080:3080"
    environment:
      NODE_ENV: production
      PORT: 3080
      FRONTEND_URL: http://localhost:3080
      TRUST_PROXY: "false"
      BCRYPT_COST: "12"
      REDIS_URL: redis://:changeme@redis:6379
      DATABASE_DRIVER: sqlite
      SQLITE_FILE: /data/chat.sqlite
      # POSTGRES_HOST: postgres
      # POSTGRES_PORT: 5432
      # POSTGRES_DB: chat
      # POSTGRES_USER: chat
      # POSTGRES_PASSWORD: chat
      # POSTGRES_SSL: false
      # MYSQL_HOST: mysql
      # MYSQL_PORT: 3306
      # MYSQL_DB: chat
      # MYSQL_USER: chat
      # MYSQL_PASSWORD: chat
      # MYSQL_SSL: false
    volumes:
      - sqlite_data:/data
      # - postgres_data:/var/lib/postgresql/data
      # - mysql_data:/var/lib/mysql
    depends_on:
      - sqlite
      - redis
      # - postgres
      # - mysql
    restart: unless-stopped

  redis:
    build:
      context: ./server/Redis
      dockerfile: Dockerfile
    image: realtime-chat-redis:latest
    container_name: chat-redis
    ports:
      - "6379:6379"
    # For dev you can inline a password; for production use secrets.
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"${REDIS_PASSWORD:-changeme}\""]
    environment:
      # Set a strong password here (dev example)
      REDIS_PASSWORD: changeme
    volumes:
      - redis_data:/data
    restart: unless-stopped

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "5540:5540"
    environment:
      - RI_HOST=0.0.0.0
      # Required to store database credentials securely; 32+ chars recommended
      - RI_ENCRYPTION_KEY=please-change-this-long-random-secret-key-32chars-min
      # Optional: protect the Redis Insight UI with a password
      # - RI_PASSWORD=admin
    restart: unless-stopped

  # postgres:
  #   build:
  #     context: ./server/Database/Postgres
  #     dockerfile: Dockerfile
  #   image: realtime-chat-postgres:latest
  #   container_name: chat-postgres
  #   environment:
  #     POSTGRES_DB: chat
  #     POSTGRES_USER: chat
  #     POSTGRES_PASSWORD: chat
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped

  # mysql:
  #   build:
  #     context: ./server/Database/MySql
  #     dockerfile: Dockerfile
  #   image: realtime-chat-mysql:latest
  #   container_name: chat-mysql
  #   environment:
  #     MYSQL_DATABASE: chat
  #     MYSQL_USER: chat
  #     MYSQL_PASSWORD: chat
  #     MYSQL_ROOT_PASSWORD: root
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   restart: unless-stopped

  # SQLite container built from our custom Dockerfile
  sqlite:
    build:
      context: ./server/Database/SqlLite
      dockerfile: Dockerfile
    image: realtime-chat-sqlite:latest
    container_name: chat-sqlite
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  # Web UI for browsing the SQLite database
  sqlite-web:
    image: coleifer/sqlite-web:latest
    container_name: chat-sqlite-web
    command: ["sqlite_web", "-H", "0.0.0.0", "/data/chat.sqlite"]
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/data
    depends_on:
      - sqlite
    restart: unless-stopped

volumes:
  sqlite_data:
  redis_data:
  # postgres_data:
  # mysql_data:
