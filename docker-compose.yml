  #   container_name: chat-sqlite-web
  #   command: ["sqlite_web", "-H", "0.0.0.0", "/data/chat.sqlite"]
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - sqlite_data:/data
  #   depends_on:
  #     - sqlite
  #   restart: unless-stopped

  # redis-commander:
  #   image: rediscommander/redis-commander:latest
  #   container_name: chat-redis-commander-web
  #   restart: unless-stopped
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     - REDIS_HOSTS=local:redis:6379:0:changeme
  #     - HTTP_USER=admin
  #     - HTTP_PASSWORD=secret
  #   depends_on:
  #     - redis
  #   profiles:
  #     - tools  # Utilise docker-compose --profile tools up pour inclure ce service

volumes:
  # sqlite_data:
  redis_data:
  minio_data:
  # postgres_data:
