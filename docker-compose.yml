version: "3.9"

services:
  server:
    build:
      context: ./server/Express
      dockerfile: Dockerfile
    image: realtime-chat-server:latest
    container_name: chat-server
    ports:
      - "3080:3080"
    environment:
      NODE_ENV: production
      PORT: 3080
      SQLITE_FILE: /data/chat.sqlite
      FRONTEND_URL: http://localhost:3080
      TRUST_PROXY: "false"
      BCRYPT_COST: "10"
    volumes:
      - sqlite_data:/data
    depends_on:
      - sqlite
    restart: unless-stopped

  # Web UI for browsing the SQLite database
  sqlite-web:
    image: coleifer/sqlite-web:latest
    container_name: chat-sqlite-web
    command: ["sqlite_web", "-H", "0.0.0.0", "/data/chat.sqlite"]
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/data
    depends_on:
      - sqlite
    restart: unless-stopped

  # SQLite container built from our custom Dockerfile
  sqlite:
    build:
      context: ./server/Database/SqlLite
      dockerfile: Dockerfile
    image: realtime-chat-sqlite:latest
    container_name: chat-sqlite
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

volumes:
  sqlite_data:
